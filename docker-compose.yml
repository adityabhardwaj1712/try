services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: jira_db
      POSTGRES_USER: jira_user
      POSTGRES_PASSWORD: jira_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      SECRET_KEY: dev-secret
      DEBUG: "True"
      POSTGRES_DB: jira_db
      POSTGRES_USER: jira_user
      POSTGRES_PASSWORD: jira_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1

volumes:
  postgres_data: