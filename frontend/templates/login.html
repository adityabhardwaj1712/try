{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>TaskFlow Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="centered">

<div class="login-card">

<h2>TaskFlow Login</h2>

<form method="POST">

    {% csrf_token %}

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red;margin-top:10px;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

</form>

</div>

</body>
</html>
