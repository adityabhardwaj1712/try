<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:8px;
width:320px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#0984e3;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#076dd1;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
