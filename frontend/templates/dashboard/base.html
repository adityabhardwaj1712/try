<!DOCTYPE html>
<html>
<head>

<title>TaskFlow</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:220px;
height:100vh;
background:#1e293b;
color:white;
position:fixed;
}

.sidebar h2{
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#334155;
}

.main{
margin-left:220px;
padding:30px;
}

.topbar{
background:white;
padding:15px 20px;
border-radius:6px;
margin-bottom:25px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:4px;
}

button{
background:#2563eb;
color:white;
padding:10px 16px;
border:none;
border-radius:4px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

table th, table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TaskFlow</h2>

<a href="/">Dashboard</a>
<a href="/organizations/">Organizations</a>
<a href="/projects/">Projects</a>
<a href="/tasks/">Tasks</a>
<a href="/comments/">Comments</a>
<a href="/notifications/">Notifications</a>
<a href="/users/">Users</a>

<br>

<div style="padding:20px">

{{ request.user.email }}

<br><br>

<a href="/logout/">Logout</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h3>{% block title %}{% endblock %}</h3>

<div>
Logged in as <b>{{ request.user.email }}</b>
</div>

</div>

{% block content %}

{% endblock %}

</div>

</body>
</html>
