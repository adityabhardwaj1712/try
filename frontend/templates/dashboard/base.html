<!DOCTYPE html>
<html>
<head>

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-gray-900 text-gray-200 flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-gray-700">
TaskFlow
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
📊 Dashboard
</a>

<a href="/projects/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
📁 Projects
</a>

<a href="/tasks/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
📝 Tasks
</a>

<a href="/comments/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
💬 Comments
</a>

<a href="/notifications/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
🔔 Notifications
</a>

<a href="/organizations/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
🏢 Organizations
</a>

<a href="/users/" class="flex items-center gap-3 p-3 hover:bg-gray-700 rounded">
👤 Users
</a>

</nav>

<!-- USER INFO -->

<div class="p-4 border-t border-gray-700">

<div class="mb-3 text-sm">

<div class="font-semibold">
{{ request.user.email }}
</div>

<div class="text-gray-400 capitalize">
Role: {{ request.user.role }}
</div>

</div>

<a href="/logout/" class="block text-center bg-red-500 hover:bg-red-600 p-2 rounded">
Logout
</a>

</div>

</aside>


<!-- MAIN AREA -->

<div class="flex-1 flex flex-col">

<!-- TOP BAR -->

<header class="bg-white shadow p-4 flex justify-between items-center">

<h1 class="text-xl font-semibold">
Dashboard
</h1>

<div class="flex items-center gap-4">

<span class="text-gray-600">
Welcome, {{ request.user.email }}
</span>

<div class="w-9 h-9 bg-gray-300 rounded-full flex items-center justify-center">
{{ request.user.email|first|upper }}
</div>

</div>

</header>


<!-- PAGE CONTENT -->

<main class="flex-1 overflow-y-auto p-6">

{% block content %}

{% endblock %}

</main>

</div>

</div>

</body>
</html>
