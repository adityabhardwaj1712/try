{% extends "dashboard/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="card">

<h2>Organizations</h2>

<ul>

{% for org in organizations %}

<li>{{ org.name }}</li>

{% endfor %}

</ul>

</div>

<div class="card">

<h2>Projects</h2>

<ul>

{% for project in projects %}

<li>{{ project.name }}</li>

{% endfor %}

</ul>

</div>

{% endblock %}
