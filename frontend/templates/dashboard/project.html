{% extends "dashboard/base.html" %}

{% block content %}

<div class="card">

<h2>Projects</h2>

<a href="/projects/create/">
<button>Create Project</button>
</a>

<table width="100%" border="1" cellspacing="0" cellpadding="10">

<tr>
<th>Name</th>
<th>Description</th>
</tr>

{% for project in projects %}

<tr>
<td>{{ project.name }}</td>
<td>{{ project.description }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
