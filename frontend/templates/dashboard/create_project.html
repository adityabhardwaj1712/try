{% extends "dashboard/base.html" %}

{% block page_title %}Create Project{% endblock %}

{% block content %}

<div class="bg-white p-6 rounded shadow max-w-xl">

<h2 class="text-xl font-semibold mb-4">
Create Project
</h2>

{% if error %}
<p class="text-red-500 mb-3">{{ error }}</p>
{% endif %}

<form method="post">

{% csrf_token %}

<!-- PROJECT NAME -->

<input
name="name"
placeholder="Project Name"
class="border border-gray-300 p-2 w-full mb-4 rounded"
required
/>

<!-- DESCRIPTION -->

<textarea
name="description"
placeholder="Project Description"
class="border border-gray-300 p-2 w-full mb-4 rounded"
></textarea>


<!-- ORGANIZATION LABEL -->

<label class="block text-sm font-medium text-gray-700 mb-1">
Organization
</label>

<!-- ORGANIZATION DROPDOWN -->

<select
name="organization"
class="border border-gray-300 p-2 w-full mb-4 rounded"
required
>

<option value="">
Select Organization
</option>

{% for org in organizations %}

<option value="{{ org.id }}">
{{ org.name }}
</option>

{% empty %}

<option disabled>No organizations available</option>

{% endfor %}

</select>


<!-- SUBMIT BUTTON -->

<button
class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition"
>
Create Project
</button>

</form>

</div>

{% endblock %}
