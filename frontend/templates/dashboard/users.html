{% extends "dashboard/base.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-6">Users</h1>

<div class="bg-white p-6 shadow rounded mb-6">

<h2 class="font-bold mb-4">Create User</h2>

<form method="POST">
{% csrf_token %}

{{ form.as_p }}

<button class="bg-blue-600 text-white px-4 py-2 rounded">
Create User
</button>

</form>

</div>

<h2 class="text-xl font-bold mb-4">All Users</h2>

<table class="w-full bg-white shadow rounded">

<tr class="border-b">

<th class="p-3">Username</th>
<th>Email</th>
<th>Role</th>

</tr>

{% for user in users %}

<tr class="border-b">

<td class="p-3">{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
