<form 
    method="post"
    hx-post="/projects/create/"
    hx-target="#project-container"
    hx-swap="outerHTML"
>
    {% csrf_token %}

    <div class="mb-3">
        {{ form.name.label_tag }}
        {{ form.name }}
    </div>

    <div class="mb-3">
        {{ form.description.label_tag }}
        {{ form.description }}
    </div>

    <button type="submit" class="btn btn-success w-100">
        Save
    </button>
</form>
